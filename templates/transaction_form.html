{% extends "base.html" %}

{% block title %}{{ 'Edit' if transaction else 'Add' }} Transaction - SimplyTrust{% endblock %}

{% block content %}
<h1 class="mb-20">{{ 'Edit' if transaction else 'Add' }} Transaction</h1>

<div class="card" style="max-width: 600px;">
    <form method="post">
        <div class="form-group">
            <label>Date *</label>
            <input type="date" name="date" class="form-control" required
                   value="{{ transaction.date if transaction else '' }}">
        </div>

        <div class="form-group">
            <label>Description *</label>
            <input type="text" name="description" class="form-control" required
                   value="{{ transaction.description if transaction else '' }}"
                   placeholder="e.g., Payment from Client ABC">
        </div>

        <div class="form-group">
            <label>Amount *</label>
            <input type="number" name="amount" class="form-control" step="0.01" min="0" required
                   value="{{ transaction.amount if transaction else '' }}"
                   placeholder="0.00">
        </div>

        <div class="form-group">
            <label>Type *</label>
            <select name="transaction_type" class="form-control" required>
                <option value="expense" {{ 'selected' if transaction and transaction.transaction_type == 'expense' }}>Expense</option>
                <option value="income" {{ 'selected' if transaction and transaction.transaction_type == 'income' }}>Income</option>
            </select>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="category_id" class="form-control">
                <option value="">-- Select Category --</option>
                <optgroup label="Income">
                    {% for cat in categories if cat.type == 'income' %}
                        <option value="{{ cat.id }}" {{ 'selected' if transaction and transaction.category_id == cat.id }}>{{ cat.name }}</option>
                    {% endfor %}
                </optgroup>
                <optgroup label="Expense">
                    {% for cat in categories if cat.type == 'expense' %}
                        <option value="{{ cat.id }}" {{ 'selected' if transaction and transaction.category_id == cat.id }}>{{ cat.name }}</option>
                    {% endfor %}
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>Account</label>
            <select name="account_id" class="form-control">
                <option value="">-- Select Account --</option>
                {% for acct in accounts %}
                    <option value="{{ acct.id }}" {{ 'selected' if transaction and transaction.account_id == acct.id }}>{{ acct.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" class="form-control" rows="3" placeholder="Optional notes...">{{ transaction.notes if transaction else '' }}</textarea>
        </div>

        {% if transaction %}
        <div class="form-group">
            <label>
                <input type="checkbox" name="reconciled" {{ 'checked' if transaction.reconciled }}>
                Mark as Reconciled
            </label>
        </div>
        {% endif %}

        <div class="flex gap-10">
            <button type="submit" class="btn btn-primary">{{ 'Update' if transaction else 'Add' }} Transaction</button>
            <a href="{{ url_for('main.transactions') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
